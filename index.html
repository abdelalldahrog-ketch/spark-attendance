 <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الحضور التفاعلي</title>
    <!-- استدعاء أسلوب تنسيق مبسط شبيه بصفحتك الحالية تماماً -->
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            direction: rtl;
        }
        .container {
            max-width: 500px;
            margin: auto;
            text-align: right;
        }
        .title {
            font-size: 24px;
            font-bold: true;
            margin-bottom: 20px;
        }
        .input-field {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            box-sizing: border-box;
        }
        .quiz-box {
            margin-top: 20px;
            margin-bottom: 20px;
        }
        .radio-group {
            margin-top: 10px;
        }
        .btn-submit {
            padding: 10px 20px;
            background-color: #f0f0f0;
            border: 1px solid #ccc;
            cursor: pointer;
            font-size: 16px;
        }
        .btn-submit:hover {
            background-color: #e0e0e0;
        }
        #msg {
            margin-top: 15px;
            font-weight: bold;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- عنوان الصفحة والأيقونة الملونة -->
        <h2 class="title">نظام تسجيل الحضور والاختبار 📊</h2>

        <!-- حقل اسم الطالب -->
        <div style="margin-bottom: 15px;">
            <label>اسم الطالب:</label>
            <input type="text" id="studentName" placeholder="مصطفى عبد العال دحروج" class="input-field">
        </div>

        <!-- سؤال الاختبار المكتوب في صفحتك -->
        <div class="quiz-box">
            <p>سؤال: معنى كلمة Blue ؟</p>
            <div class="radio-group">
                <label><input type="radio" name="quiz" value="أزرق"> أزرق</label>
                <label style="margin-right: 15px;"><input type="radio" name="quiz" value="أحمر"> أحمر</label>
                <label style="margin-right: 15px;"><input type="radio" name="quiz" value="أخضر"> أخضر</label>
            </div>
        </div>

        <!-- الزر مع إضافة المعرّف id لضمان الضغط بنجاح -->
        <button id="btnSubmit" class="btn-submit">تسجيل الحضور وإرسال</button>

        <!-- مكان ظهور رسالة النجاح أو التحميل -->
        <p id="msg"></p>
    </div>

    <!-- كود ربط وتشغيل السيرفر وقاعدة البيانات Firestore -->
    <script type="module">
        import { initializeApp } from "https://gstatic.com";
        import { getFirestore, collection, addDoc } from "https://gstatic.com";

        // إعدادات مشروعك الحالي المفتوح أمامك في الصورة spark-attendance
        const firebaseConfig = {
            apiKey: "AIzaSyAgi9oAxNdAD-LHVnC-pNbJ_AyHPn1azak",
            authDomain: "://firebaseapp.com",
            projectId: "spark-attendance",
            storageBucket: "spark-attendance.firebasestorage.app",
            messagingSenderId: "7353997849",
            appId: "1:7353997849:web:ab2eb7bcdd65b78e9f6888"
        };

        // تهيئة النظام
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // دالة الإرسال وحفظ البيانات
        async function sendAttendanceData() {
            const nameInput = document.getElementById("studentName");
            const name = nameInput ? nameInput.value.trim() : "";
            const quizChecked = document.querySelector('input[name="quiz"]:checked');
            const msgElement = document.getElementById("msg");

            if (!name || !quizChecked) {
                alert("الرجاء كتابة الاسم واختيار الإجابة أولاً!");
                return;
            }

            msgElement.style.color = "blue";
            msgElement.innerText = "⏳ جاري الإرسال والتسجيل في Firebase...";

            // التحقق من صحة الإجابة (أزرق) لجمع الدرجات
            const isCorrect = (quizChecked.value === "أزرق");
            const grade = isCorrect ? 100 : 0;

            try {
                // إرسال البيانات مباشرة إلى جدول Cloud Firestore
                await addDoc(collection(db, "attendance"), {
                    name: name,
                    answer: quizChecked.value,
                    grade: grade,
                    result: isCorrect ? "Success" : "Fail",
                    attendance: "حاضر",
                    time: new Date()
                });

                msgElement.style.color = "green";
                msgElement.innerText = "✅ تم تسجيل الحضور والدرجة بنجاح في السيرفر!";
                
                // تفريغ الحقول تلقائياً لتسهيل تسجيل الطالب التالي
                nameInput.value = "";
                quizChecked.checked = false;

            } catch (error) {
                console.error("Firebase Error:", error);
                msgElement.style.color = "red";
                msgElement.innerText = "❌ حدث خطأ في الاتصال بقاعدة البيانات!";
            }
        }

        // الربط المباشر والأكيد لحدث الضغط على الزر
        document.getElementById("btnSubmit").addEventListener("click", sendAttendanceData);
    </script>

</body>
</html>
