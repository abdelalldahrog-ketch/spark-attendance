 <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الحضور التفاعلي</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            direction: rtl;
        }
        .container {
            max-width: 500px;
            margin: auto;
            text-align: right;
        }
        .title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .input-field {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            box-sizing: border-box;
        }
        .quiz-box {
            margin-top: 20px;
            margin-bottom: 20px;
        }
        .radio-group {
            margin-top: 10px;
        }
        .btn-submit {
            padding: 10px 20px;
            background-color: #f0f0f0;
            border: 1px solid #ccc;
            cursor: pointer;
            font-size: 16px;
        }
        .btn-submit:hover {
            background-color: #e0e0e0;
        }
        #msg {
            margin-top: 15px;
            font-weight: bold;
            font-size: 16px;
        }
    </style>

    <!-- 1️⃣ تحميل مكتبات الـ Firebase المستقرة التي لا تسبب أخطاء CORS المتصفح -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
</head>
<body>

    <div class="container">
        <h2 class="title">نظام تسجيل الحضور والاختبار 📊</h2>

        <div style="margin-bottom: 15px;">
            <label>اسم الطالب:</label>
            <input type="text" id="studentName" placeholder="اكتب اسمك هنا..." class="input-field">
        </div>

        <div class="quiz-box">
            <p>سؤال: معنى كلمة Blue ؟</p>
            <div class="radio-group">
                <label><input type="radio" name="quiz" value="أزرق"> أزرق</label>
                <label style="margin-right: 15px;"><input type="radio" name="quiz" value="أحمر"> أحمر</label>
                <label style="margin-right: 15px;"><input type="radio" name="quiz" value="أخضر"> أخضر</label>
            </div>
        </div>

        <!-- 2️⃣ ربط الزر مباشرة بالدالة لتجنب خطأ is not defined -->
        <button onclick="submitData()" class="btn-submit">تسجيل الحضور وإرسال</button>

        <p id="msg"></p>
    </div>

    <script>
        // إعدادات مشروعك الحالي المفتوح لديك spark-attendance
        const firebaseConfig = {
            apiKey: "AIzaSyAgi9oAxNdAD-LHVnC-pNbJ_AyHPn1azak",
            authDomain: "://firebaseapp.com",
            projectId: "spark-attendance",
            storageBucket: "spark-attendance.firebasestorage.app",
            messagingSenderId: "7353997849",
            appId: "1:7353997849:web:ab2eb7bcdd65b78e9f6888"
        };

        // 3️⃣ تهيئة نظام الفايربيس بالطريقة المتوافقة
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 4️⃣ دالة الإرسال الرئيسية والمطابقة للزر
        async function submitData() {
            const nameInput = document.getElementById("studentName");
            const name = nameInput ? nameInput.value.trim() : "";
            const quizChecked = document.querySelector('input[name="quiz"]:checked');
            const msgElement = document.getElementById("msg");

            if (!name || !quizChecked) {
                alert("الرجاء كتابة الاسم واختيار الإجابة أولاً!");
                return;
            }

            msgElement.style.color = "blue";
            msgElement.innerText = "⏳ جاري الإرسال والتسجيل في Firebase...";

            const isCorrect = (quizChecked.value === "أزرق");
            const grade = isCorrect ? 100 : 0;

            try {
                // إرسال البيانات مباشرة إلى جدول Cloud Firestore
                await db.collection("attendance").add({
                    name: name,
                    answer: quizChecked.value,
                    grade: grade,
                    result: isCorrect ? "Success" : "Fail",
                    attendance: "حاضر",
                    time: firebase.firestore.FieldValue.serverTimestamp()
                });

                msgElement.style.color = "green";
                msgElement.innerText = "✅ تم تسجيل الحضور والدرجة بنجاح في السيرفر!";
                
                // تفريغ الحقول تلقائياً
                nameInput.value = "";
                quizChecked.checked = false;

            } catch (error) {
                console.error("Firebase Error:", error);
                msgElement.style.color = "red";
                msgElement.innerText = "❌ حدث خطأ أثناء الاتصال بقاعدة البيانات!";
            }
        }
    </script>

</body>
</html>
