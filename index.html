 <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>نظام الحضور Firebase</title>
</head>

<body>

<h2>تسجيل الحضور</h2>

<input type="text" id="studentName" placeholder="اسم الطالب">

<p>سؤال: معنى Blue؟</p>

<label><input type="radio" name="quiz" value="100"> أزرق</label><br>
<label><input type="radio" name="quiz" value="0"> أحمر</label><br>

<button onclick="submitData()">تسجيل</button>

<p id="msg"></p>

<script type="module">

// 1️⃣ Firebase imports
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

// 2️⃣ Config (ضع بياناتك)
const firebaseConfig = {
  apiKey: "AIzaSyI9oAxNdAD-LHVnC-pNbJ_AyHPn1azak",
  authDomain: "spark-attendance.firebaseapp.com",
  projectId: "spark-attendance",
  storageBucket: "spark-attendance.firebasestorage.app",
  messagingSenderId: "7353997849",
  appId: "1:7353997849:web:ab2eb7bcdd65b78e9f6888"
};

// 3️⃣ Init Firebase
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 4️⃣ Function
window.submitData = async function(){

  const name = document.getElementById("studentName").value;
  const quiz = document.querySelector('input[name="quiz"]:checked');

  if(!name || !quiz){
    alert("اكتب الاسم واختر الإجابة");
    return;
  }

  try {
    await addDoc(collection(db, "attendance"), {
      name: name,
      grade: Number(quiz.value),
      result: Number(quiz.value) >= 50 ? "Success" : "Fail",
      attendance: "حاضر",
      time: new Date()
    });

    document.getElementById("msg").innerText = "✅ تم تسجيل الحضور بنجاح";

  } catch (e) {
    console.error(e);
    document.getElementById("msg").innerText = "❌ حدث خطأ";
  }
}

</script>

</body>
</html>
